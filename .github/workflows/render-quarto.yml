name: Render Quarto Notebooks

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    container:
      image: pecan/base:develop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: '1.8.17'

      - name: Install TinyTeX
        run: |
          quarto install tinytex

      - name: Check R code style with styler
        run: |
          Rscript -e 'if (!requireNamespace("styler", quietly = TRUE)) install.packages("styler")'
          Rscript -e 'unstyled <- styler::style_file("documentation/tutorials/Demo_1_Basic_Run/run_pecan.qmd"); if (any(unstyled$changed)) { print(unstyled); stop("run_pecan.qmd is not styled. Please run styler::style_file() locally and commit the changes.") } else { cat("run_pecan.qmd is styled.\n") }'

      - name: Render the Quarto notebook to PDF
        run: |
          quarto render documentation/tutorials/Demo_1_Basic_Run/run_pecan.qmd --to pdf
