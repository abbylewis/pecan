[workspace]
authors = ["Alexey Shiklomanov <alexey.shiklomanov@gmail.com>"]
channels = ["conda-forge"]
name = "cimis-et-complete"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
[tasks.pak]
args = [{arg = "pkg"}]
cmd = 'Rscript -e "pak::pak(\"{{ pkg }}\")"'

[tasks.rdinst]
args = [{arg = "path"}]
cmd = 'Rscript -e "devtools::install(\"{{ path }}\", upgrade = FALSE)"'

[tasks.rdoc]
args = [{arg = "path"}]
cmd = 'Rscript -e "devtools::document(\"{{ path }}\")"'

[tasks.inst_local]
depends-on = [
  {task = "rdinst", args = ["base/logger"]},
  {task = "rdinst", args = ["base/utils"]},
  {task = "rdinst", args = ["base/remote"]},
  {task = "rdinst", args = ["base/db"]},
  {task = "rdinst", args = ["modules/data.land"]},
  {task = "rdinst", args = ["modules/data.atmosphere"]},
  {task = "rdinst", args = ["models/sipnet"]},
  {task = "rdinst", args = ["base/settings"]}
]

[tasks.targets]
args = [{arg = "tar_project", default = "small"}]
cmd = "TAR_PROJECT={{ tar_project }} Rscript -e 'targets::tar_make()'"

[tasks.outdated]
args = [{arg = "tar_project", default = "small"}]
cmd = "TAR_PROJECT={{ tar_project }} Rscript -e 'targets::tar_outdated()'"

[tasks.target_build]
depends-on = [
  {task = "rdinst", args = ["modules/data.land"]},
  {task = "targets"}
]

[dependencies]
