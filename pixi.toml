r-roxygen2 = "==7.3.3"
r-abind = ">=1.4.5"
r-arrow = "*"
r-coda = "*"
r-curl = "*"
r-dbplyr = ">=2.4.0"
r-devtools = "*"
r-dplyr = ">=1.1.2"
r-dplR = "*"
r-foreach = "*"
r-fs = "*"
r-future = "*"
r-furrr = "*"
r-httr = "*"
r-httr2 = "*"
r-jsonlite = "*"
r-lubridate = "*"
r-magrittr = "*"
r-nanoarrow = "*"
r-ncdf4 = ">=1.15"
r-purrr = "*"
r-rlang = "*"
r-sf = "*"
r-stringi = "*"
r-stringr = "*"
r-terra = "*"
r-testthat = "*"
r-tibble = "*"
r-tidyr = "*"
r-tidyselect = "*"
r-withr = "*"
r-xml = ">=3.98"
r-dbi = "*"
r-glue = "*"
"r-R.utils" = "*"
r-units = "*"
r-urltools = "*"
